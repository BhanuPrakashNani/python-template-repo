version: 2.1

orbs:
  python: circleci/python@2.1

jobs:
  build-and-test:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Install UV
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
      - run:
          name: Setup Project
          command: |
            uv venv
            uv pip install pytest pytest-cov ruff mypy
            uv pip install -e src/components/calculator
            uv pip install -e src/components/logger
            uv pip install -e src/components/notifier
      - run:
          name: Run Linting
          command: |
            ruff check .
            mypy src/components/*/src
      - run:
          name: Run Unit Tests
          command: |
            pytest src/components/*/tests -v --junitxml=test-results/junit.xml
      - run:
          name: Run Integration Tests
          command: |
            pytest tests/Integration -v
      - run:
          name: Run E2E Tests
          command: |
            pytest tests/EndToEnd -v
      - run:
          name: Generate Coverage Report
          command: |
            pytest --cov=src --cov-report=xml --cov-report=html
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: htmlcov
          destination: coverage-report

workflows:
  main:
    jobs:
      - build-and-test
