[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "python-template-repo"
version = "0.1.0"
description = "A template repository for Python projects with best practices"
requires-python = ">=3.11"
dependencies = [
    "ruff>=0.1.9",
    "mypy>=1.8.0",
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "coverage>=7.4.0",
    "safety>=2.3.5"
]

[tool.ruff]
select = ["ALL"]
ignore = [
    "ANN101",  # Disable missing type annotation for self in methods
    "ANN102",  # Disable missing type annotation for cls in classmethods
]

[tool.mypy]
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--cov=src",
    "--cov-report=xml",
    "--cov-report=html",
    "--junitxml=test-results/junit.xml"
]

[tool.coverage.run]
source = ["src"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "pass",
    "raise ImportError"
]